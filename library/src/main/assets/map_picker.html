<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Seleccionar ubicación</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#0F0F0F;color:#F0F0F0;font-family:sans-serif;overflow:hidden}
  #map{width:100%;height:calc(100% - 72px)}
  #bottom{
    position:fixed;bottom:0;left:0;right:0;height:72px;
    background:#1A1A1A;border-top:1px solid #2A2A2A;
    display:flex;align-items:center;justify-content:space-between;padding:0 16px;
    z-index:9999
  }
  #coordsBox{font-size:12px;color:#A0A0A0;line-height:1.7}
  #coordsBox b{color:#00C896;font-size:13px}
  #btnOk{
    background:#00C896;color:#000;border:none;border-radius:8px;
    padding:10px 24px;font-size:15px;font-weight:bold;cursor:pointer;min-width:110px
  }
  #btnOk:active{opacity:.8}
  #btnOk:disabled{background:#2E2E2E;color:#606060;cursor:default}
  #hint{
    position:absolute;top:12px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.7);color:#fff;border-radius:20px;
    padding:6px 14px;font-size:12px;pointer-events:none;white-space:nowrap;z-index:1000
  }
  #locBtn{
    position:absolute;bottom:88px;right:10px;z-index:1000;
    width:42px;height:42px;border-radius:50%;border:none;
    background:#1A1A1A;color:#00C896;font-size:20px;cursor:pointer;
    box-shadow:0 2px 6px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="hint">Toca el mapa o arrastra el marcador</div>
<button id="locBtn" onclick="goToGps()" title="Mi ubicación">⊕</button>
<div id="bottom">
  <div id="coordsBox">
    Lat:&nbsp;<b id="latTxt">—</b><br>
    Lng:&nbsp;<b id="lngTxt">—</b>
  </div>
  <button id="btnOk" onclick="doConfirm()" disabled>Confirmar</button>
</div>
<script>
var map=L.map('map',{zoomControl:true,attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

var pinIcon=L.divIcon({
  className:'',
  html:'<div style="width:22px;height:22px;background:#00C896;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(0,200,150,.9);margin:-11px 0 0 -11px"></div>',
  iconSize:[0,0],iconAnchor:[0,0]
});

var marker=null,pinLat=null,pinLng=null,gpsLat=null,gpsLng=null;

function setPin(lat,lng){
  pinLat=lat;pinLng=lng;
  document.getElementById('latTxt').textContent=lat.toFixed(6);
  document.getElementById('lngTxt').textContent=lng.toFixed(6);
  document.getElementById('btnOk').disabled=false;
  document.getElementById('hint').style.display='none';
  if(marker)marker.setLatLng([lat,lng]);
  else{
    marker=L.marker([lat,lng],{icon:pinIcon,draggable:true}).addTo(map);
    marker.on('dragend',function(e){var p=e.target.getLatLng();setPin(p.lat,p.lng);});
  }
}

map.on('click',function(e){setPin(e.latlng.lat,e.latlng.lng);});

function initLocation(lat,lng){map.setView([lat,lng],15);setPin(lat,lng);gpsLat=lat;gpsLng=lng;}

function updateGps(lat,lng){gpsLat=lat;gpsLng=lng;if(pinLat===null)initLocation(lat,lng);}

function goToGps(){if(gpsLat!==null){map.setView([gpsLat,gpsLng],16);setPin(gpsLat,gpsLng);}}

function doConfirm(){if(pinLat!==null&&pinLng!==null)Android.onConfirm(pinLat,pinLng);}

map.setView([14.6349,-90.5069],7);
</script>
</body>
</html>
